<body>
<div id="root"></div>

<script>
'use strict';

const META_POR_PERSONA = 300000;
const FECHA_LIMITE = '2026-06-15';

const CATEGORIAS = [
  { id: 'pago_finca', nombre: 'Pago finca', color: '#c97a3a' },
  { id: 'comida', nombre: 'Comida', color: '#7eb850' },
  { id: 'transporte', nombre: 'Transporte', color: '#5a9bd4' },
  { id: 'materiales', nombre: 'Materiales', color: '#b07ac9' },
  { id: 'servicios', nombre: 'Servicios', color: '#d4a55a' },
  { id: 'otros', nombre: 'Otros', color: '#8a7a65' }
];

// Storage usando localStorage (siempre disponible en navegadores)
const storage = {
  get(key) {
    const v = localStorage.getItem(key);
    return v ? { value: v } : null;
  },
  set(key, value) { localStorage.setItem(key, value); },
  delete(key) { localStorage.removeItem(key); },
  list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) keys.push(k);
    }
    return { keys };
  }
};

// Helpers
const fmtPesos = n => '$ ' + (n || 0).toLocaleString('es-CO');
const fmtFecha = iso => {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return parseInt(d,10) + ' ' + meses[parseInt(m,10)-1] + ' ' + y;
};
const hoyISO = () => {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
};
const diasHasta = iso => {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fin = new Date(iso); fin.setHours(0,0,0,0);
  return Math.ceil((fin - hoy) / 86400000);
};
const escapeHtml = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = p => p + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);

const ICONS = {
  plus: 'M12 5v14M5 12h14',
  x: 'M18 6L6 18M6 6l12 12',
  trash: 'M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6',
  edit: 'M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z',
  check: 'M20 6L9 17l-5-5',
  calendar: 'M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zM16 2v4M8 2v4M3 10h18',
  users: 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z',
  wallet: 'M21 12V7H5a2 2 0 0 1 0-4h14v4M3 5v14a2 2 0 0 0 2 2h16v-5M16 12h5'
};
const icon = (name, size) => {
  size = size || 18;
  return '<svg class="icon" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="'+ICONS[name]+'"/></svg>';
};

const state = {
  tab: 'personas',
  personas: [],
  gastos: [],
  loading: true,
  vista: 'lista',
  personaSelId: null,
  showFormPersona: false,
  nuevoNombre: '',
  nuevoMonto: '',
  nuevoFecha: hoyISO(),
  editandoNombre: false,
  nombreEdit: '',
  showFormGasto: false,
  gastoMonto: '',
  gastoFecha: hoyISO(),
  gastoCat: 'pago_finca',
  gastoDesc: '',
  filtroCat: 'todos'
};

const totalPag = p => (p.abonos || []).reduce((s, a) => s + a.monto, 0);
const restante = p => Math.max(0, META_POR_PERSONA - totalPag(p));
const pct = p => Math.min(100, (totalPag(p) / META_POR_PERSONA) * 100);
const completo = p => totalPag(p) >= META_POR_PERSONA;

function cargar() {
  try {
    const lp = storage.list('persona:');
    const lg = storage.list('gasto:');
    const ps = [];
    for (const k of lp.keys) {
      const r = storage.get(k);
      if (r && r.value) {
        try { ps.push(JSON.parse(r.value)); } catch(e) {}
      }
    }
    ps.sort((a, b) => a.nombre.localeCompare(b.nombre, 'es'));
    const gs = [];
    for (const k of lg.keys) {
      const r = storage.get(k);
      if (r && r.value) {
        try { gs.push(JSON.parse(r.value)); } catch(e) {}
      }
    }
    state.personas = ps;
    state.gastos = gs;
  } finally {
    state.loading = false;
    render();
  }
}

function agregarPersona() {
  const nombre = state.nuevoNombre.trim();
  if (!nombre) return;
  const p = { id: uid('p'), nombre, abonos: [] };
  storage.set('persona:' + p.id, JSON.stringify(p));
  state.personas = [...state.personas, p].sort((a, b) => a.nombre.localeCompare(b.nombre, 'es'));
  state.nuevoNombre = '';
  state.showFormPersona = false;
  render();
}

function eliminarPersona(id) {
  if (!confirm('¿Eliminar esta persona y todos sus abonos?')) return;
  storage.delete('persona:' + id);
  state.personas = state.personas.filter(p => p.id !== id);
  if (state.personaSelId === id) {
    state.vista = 'lista';
    state.personaSelId = null;
  }
  render();
}

function agregarAbono() {
  const monto = parseInt(state.nuevoMonto.replace(/\D/g, ''), 10);
  if (!monto || monto <= 0 || !state.personaSelId) return;
  const p = state.personas.find(x => x.id === state.personaSelId);
  if (!p) return;
  const a = { id: uid('a'), monto, fecha: state.nuevoFecha };
  const upd = Object.assign({}, p, { abonos: [...(p.abonos || []), a] });
  storage.set('persona:' + upd.id, JSON.stringify(upd));
  state.personas = state.personas.map(x => x.id === upd.id ? upd : x);
  state.nuevoMonto = '';
  state.nuevoFecha = hoyISO();
  render();
}

function eliminarAbono(abId) {
  const p = state.personas.find(x => x.id === state.personaSelId);
  if (!p) return;
  const upd = Object.assign({}, p, { abonos: p.abonos.filter(a => a.id !== abId) });
  storage.set('persona:' + upd.id, JSON.stringify(upd));
  state.personas = state.personas.map(x => x.id === upd.id ? upd : x);
  render();
}

function guardarNombreEdit() {
  const nombre = state.nombreEdit.trim();
  if (!nombre) return;
  const p = state.personas.find(x => x.id === state.personaSelId);
  if (!p) return;
  const upd = Object.assign({}, p, { nombre });
  storage.set('persona:' + upd.id, JSON.stringify(upd));
  state.personas = state.personas
    .map(x => x.id === upd.id ? upd : x)
    .sort((a, b) => a.nombre.localeCompare(b.nombre, 'es'));
  state.editandoNombre = false;
  render();
}

function agregarGasto() {
  const monto = parseInt(state.gastoMonto.replace(/\D/g, ''), 10);
  if (!monto || monto <= 0) return;
  const g = {
    id: uid('g'),
    monto,
    fecha: state.gastoFecha,
    categoria: state.gastoCat,
    descripcion: state.gastoDesc.trim()
  };
  storage.set('gasto:' + g.id, JSON.stringify(g));
  state.gastos = [...state.gastos, g];
  state.gastoMonto = '';
  state.gastoDesc = '';
  state.gastoFecha = hoyISO();
  state.gastoCat = 'pago_finca';
  state.showFormGasto = false;
  render();
}

function eliminarGasto(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  storage.delete('gasto:' + id);
  state.gastos = state.gastos.filter(g => g.id !== id);
  render();
}

function render() {
  const root = document.getElementById('root');

  if (state.loading) {
    root.innerHTML = '<div class="app" style="display:flex;align-items:center;justify-content:center;min-height:80vh;"><div class="display-italic" style="font-size:20px;color:#8a7a65;">Cargando…</div></div>';
    return;
  }

  if (state.vista === 'detalle' && state.personaSelId) {
    renderDetalle();
  } else {
    renderLista();
  }
  attachHandlers();
}

function renderLista() {
  const recaudado = state.personas.reduce((s, p) => s + totalPag(p), 0);
  const metaTot = state.personas.length * META_POR_PERSONA;
  const completos = state.personas.filter(completo).length;
  const dias = diasHasta(FECHA_LIMITE);
  const totalGastado = state.gastos.reduce((s, g) => s + g.monto, 0);
  const balance = recaudado - totalGastado;

  let contenido = '';

  if (state.tab === 'personas') {
    let resumenHtml = '';
    if (state.personas.length > 0) {
      resumenHtml =
        '<div class="resumen-grid fade-in">' +
          '<div class="resumen-card">' +
            '<div class="resumen-label">Recaudado</div>' +
            '<div class="resumen-valor green">' + fmtPesos(recaudado) + '</div>' +
            '<div class="resumen-sub">de ' + fmtPesos(metaTot) + '</div>' +
          '</div>' +
          '<div class="resumen-card">' +
            '<div class="resumen-label">Completos</div>' +
            '<div class="resumen-valor">' + completos + '<span class="light">/' + state.personas.length + '</span></div>' +
            '<div class="resumen-sub">personas al día</div>' +
          '</div>' +
          '<div class="resumen-card wide">' +
            '<div class="resumen-label">Fecha límite</div>' +
            '<div class="resumen-valor ' + (dias < 30 ? 'warn' : '') + '">' +
              (dias > 0 ? dias + ' días' : (dias === 0 ? 'HOY' : 'Vencido')) +
            '</div>' +
            '<div class="resumen-sub">15 de junio de 2026</div>' +
          '</div>' +
        '</div>';
    }

    let vacioHtml = '';
    if (state.personas.length === 0 && !state.showFormPersona) {
      vacioHtml = '<div class="vacio"><div class="vacio-titulo">Aún no hay personas</div><div class="vacio-sub">Empieza agregando a quienes participan en la cuota</div></div>';
    }

    const listaHtml = state.personas.map(p => {
      const tp = totalPag(p);
      const pp = pct(p);
      const done = completo(p);
      return '<button class="item-card' + (done ? ' done' : '') + '" data-action="ver-persona" data-id="' + p.id + '">' +
        '<div class="persona-info">' +
          '<div class="persona-nombre">' + escapeHtml(p.nombre) + '</div>' +
          '<div class="persona-sub">' + fmtPesos(tp) + '<span class="muted"> de ' + fmtPesos(META_POR_PERSONA) + '</span></div>' +
          '<div class="mini-barra-fondo"><div class="mini-barra-llena" style="width:' + pp + '%;background:' + (done ? '#7eb850' : '#c97a3a') + '"></div></div>' +
        '</div>' +
        '<div class="persona-pct-wrap">' +
          '<div class="persona-pct ' + (done ? 'done' : 'pending') + '">' + pp.toFixed(0) + '%</div>' +
          (done ? '<div class="check-badge">✓</div>' : '') +
        '</div>' +
      '</button>';
    }).join('');

    let formHtml;
    if (state.showFormPersona) {
      formHtml = '<div class="form-card">' +
        '<input class="input-base" id="input-nombre-nueva" value="' + escapeHtml(state.nuevoNombre) + '" placeholder="Nombre de la persona" />' +
        '<div class="form-row-btns">' +
          '<button class="btn-confirm" data-action="agregar-persona">Agregar</button>' +
          '<button class="btn-cancel" data-action="cancelar-persona">Cancelar</button>' +
        '</div>' +
      '</div>';
    } else {
      formHtml = '<button class="btn-primario" data-action="mostrar-form-persona">' + icon('plus') + ' Agregar persona</button>';
    }

    contenido =
      resumenHtml +
      '<div class="seccion">' +
        '<div class="seccion-titulo-row"><h2 class="seccion-titulo">Personas</h2><span class="seccion-count">' + state.personas.length + '</span></div>' +
        vacioHtml +
        '<div class="lista">' + listaHtml + '</div>' +
        formHtml +
      '</div>';
  } else {
    // GASTOS
    const cantNum = state.gastos.length;

    let categoriaHtml = '';
    if (cantNum > 0) {
      const items = CATEGORIAS.map(cat => {
        const total = state.gastos.filter(g => g.categoria === cat.id).reduce((s, g) => s + g.monto, 0);
        if (total === 0) return '';
        const pctCat = totalGastado > 0 ? (total / totalGastado) * 100 : 0;
        return '<div class="registro-item" style="flex-direction:column;align-items:stretch;gap:8px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<div><span class="cat-tag" style="background:' + cat.color + '22;color:' + cat.color + ';border:1px solid ' + cat.color + '66;">' + cat.nombre + '</span></div>' +
            '<div class="registro-monto gasto">' + fmtPesos(total) + '</div>' +
          '</div>' +
          '<div class="mini-barra-fondo"><div class="mini-barra-llena" style="width:' + pctCat + '%;background:' + cat.color + ';"></div></div>' +
        '</div>';
      }).join('');
      categoriaHtml =
        '<div class="seccion">' +
          '<div class="seccion-titulo-row"><h2 class="seccion-titulo">Por categoría</h2></div>' +
          '<div class="lista-items">' + items + '</div>' +
        '</div>';
    }

    const gastosFiltrados = [...state.gastos]
      .filter(g => state.filtroCat === 'todos' || g.categoria === state.filtroCat)
      .sort((a, b) => b.fecha.localeCompare(a.fecha));

    let filtrosHtml = '';
    if (cantNum > 0) {
      filtrosHtml = '<div class="chips-row">' +
        '<button class="chip ' + (state.filtroCat === 'todos' ? 'active' : '') + '" data-action="filtro-cat" data-cat="todos">Todos</button>' +
        CATEGORIAS.filter(c => state.gastos.some(g => g.categoria === c.id)).map(c =>
          '<button class="chip ' + (state.filtroCat === c.id ? 'active' : '') + '" data-action="filtro-cat" data-cat="' + c.id + '">' + c.nombre + '</button>'
        ).join('') +
      '</div>';
    }

    let vacioGastoHtml = '';
    if (cantNum === 0 && !state.showFormGasto) {
      vacioGastoHtml = '<div class="vacio"><div class="vacio-titulo">Sin gastos registrados</div><div class="vacio-sub">Lleva el control de pagos, comida, materiales y más</div></div>';
    }

    const listaGastosHtml = gastosFiltrados.map(g => {
      const cat = CATEGORIAS.find(c => c.id === g.categoria) || CATEGORIAS[5];
      return '<div class="registro-item">' +
        '<div class="registro-info">' +
          '<span class="cat-tag" style="background:' + cat.color + '22;color:' + cat.color + ';border:1px solid ' + cat.color + '66;">' + cat.nombre + '</span>' +
          '<div class="registro-monto gasto">' + fmtPesos(g.monto) + '</div>' +
          (g.descripcion ? '<div class="registro-desc">' + escapeHtml(g.descripcion) + '</div>' : '') +
          '<div class="registro-fecha">' + fmtFecha(g.fecha) + '</div>' +
        '</div>' +
        '<button class="icon-btn-small" data-action="eliminar-gasto" data-id="' + g.id + '">' + icon('trash', 16) + '</button>' +
      '</div>';
    }).join('');

    let formGastoHtml;
    if (state.showFormGasto) {
      const formattedMonto = state.gastoMonto ? parseInt(state.gastoMonto.replace(/\D/g,''), 10).toLocaleString('es-CO') : '';
      formGastoHtml = '<div class="form-card">' +
        '<div class="form-grid">' +
          '<div class="form-col">' +
            '<label class="label">Monto</label>' +
            '<div class="input-monto-wrap">' +
              '<span class="peso-sign">$</span>' +
              '<input class="input-base input-monto" id="input-gasto-monto" type="text" inputmode="numeric" value="' + formattedMonto + '" placeholder="50.000" />' +
            '</div>' +
          '</div>' +
          '<div class="form-col">' +
            '<label class="label">Fecha</label>' +
            '<input class="input-base" id="input-gasto-fecha" type="date" value="' + state.gastoFecha + '" />' +
          '</div>' +
        '</div>' +
        '<div class="form-col" style="margin-bottom:12px;">' +
          '<label class="label">Categoría</label>' +
          '<div class="chips-row" style="margin-top:6px;margin-bottom:0;">' +
            CATEGORIAS.map(c => {
              const active = state.gastoCat === c.id;
              const style = active ? ' style="background:' + c.color + ';border-color:' + c.color + ';"' : '';
              return '<button class="chip' + (active ? ' active' : '') + '" data-action="set-cat" data-cat="' + c.id + '"' + style + '>' + c.nombre + '</button>';
            }).join('') +
          '</div>' +
        '</div>' +
        '<div class="form-col" style="margin-bottom:12px;">' +
          '<label class="label">Descripción (opcional)</label>' +
          '<input class="input-base" id="input-gasto-desc" value="' + escapeHtml(state.gastoDesc) + '" placeholder="Ej: Mercado del sábado" />' +
        '</div>' +
        '<div class="form-row-btns">' +
          '<button class="btn-confirm" data-action="agregar-gasto">Registrar</button>' +
          '<button class="btn-cancel" data-action="cancelar-gasto">Cancelar</button>' +
        '</div>' +
      '</div>';
    } else {
      formGastoHtml = '<button class="btn-primario" data-action="mostrar-form-gasto">' + icon('plus') + ' Agregar gasto</button>';
    }

    contenido =
      '<div class="resumen-grid fade-in">' +
        '<div class="resumen-card">' +
          '<div class="resumen-label">Total gastado</div>' +
          '<div class="resumen-valor warn">' + fmtPesos(totalGastado) + '</div>' +
          '<div class="resumen-sub">' + cantNum + ' ' + (cantNum === 1 ? 'registro' : 'registros') + '</div>' +
        '</div>' +
        '<div class="resumen-card">' +
          '<div class="resumen-label">Balance</div>' +
          '<div class="resumen-valor ' + (balance >= 0 ? 'green' : 'red') + '">' + fmtPesos(balance) + '</div>' +
          '<div class="resumen-sub">recaudado − gastos</div>' +
        '</div>' +
      '</div>' +
      categoriaHtml +
      '<div class="seccion">' +
        '<div class="seccion-titulo-row"><h2 class="seccion-titulo">Gastos</h2><span class="seccion-count">' + cantNum + '</span></div>' +
        filtrosHtml +
        vacioGastoHtml +
        '<div class="lista-items">' + listaGastosHtml + '</div>' +
        '<div style="margin-top:12px;">' + formGastoHtml + '</div>' +
      '</div>';
  }

  document.getElementById('root').innerHTML =
    '<div class="app">' +
      '<div class="header">' +
        '<div class="tagline">FINCA · CUOTAS</div>' +
        '<h1 class="titulo-app">Re<span class="accent">caudo</span></h1>' +
        '<div class="subtitulo">Meta: ' + fmtPesos(META_POR_PERSONA) + ' por persona · antes del 15 de junio</div>' +
      '</div>' +
      '<div class="tabs">' +
        '<button class="tab ' + (state.tab === 'personas' ? 'active' : '') + '" data-action="set-tab" data-tab="personas">' + icon('users', 14) + ' Cuotas</button>' +
        '<button class="tab ' + (state.tab === 'gastos' ? 'active' : '') + '" data-action="set-tab" data-tab="gastos">' + icon('wallet', 14) + ' Gastos</button>' +
      '</div>' +
      contenido +
      '<div class="footer">Datos guardados localmente · ' + state.personas.length + ' ' + (state.personas.length === 1 ? 'persona' : 'personas') + ' · ' + state.gastos.length + ' ' + (state.gastos.length === 1 ? 'gasto' : 'gastos') + '</div>' +
    '</div>';
}

function renderDetalle() {
  const p = state.personas.find(x => x.id === state.personaSelId);
  if (!p) {
    state.vista = 'lista';
    renderLista();
    return;
  }
  const tp = totalPag(p);
  const pp = pct(p);
  const done = completo(p);
  const abonosSorted = [...(p.abonos || [])].sort((a, b) => b.fecha.localeCompare(a.fecha));

  let headerHtml;
  if (state.editandoNombre) {
    headerHtml = '<div class="detalle-nombre-row">' +
      '<input class="input-nombre-edit" id="input-edit-nombre" value="' + escapeHtml(state.nombreEdit) + '" />' +
      '<button class="icon-btn-green" data-action="guardar-nombre">' + icon('check') + '</button>' +
      '<button class="icon-btn-red" data-action="cancelar-edit-nombre">' + icon('x') + '</button>' +
    '</div>';
  } else {
    headerHtml = '<div class="detalle-nombre-row">' +
      '<h1 class="detalle-nombre">' + escapeHtml(p.nombre) + '</h1>' +
      '<button class="icon-btn" data-action="editar-nombre">' + icon('edit', 16) + '</button>' +
    '</div>';
  }

  let formAbonoHtml = '';
  if (!done) {
    const formattedMonto = state.nuevoMonto ? parseInt(state.nuevoMonto.replace(/\D/g,''), 10).toLocaleString('es-CO') : '';
    formAbonoHtml = '<div class="form-section">' +
      '<h3 class="form-titulo">Nuevo abono</h3>' +
      '<div class="form-grid">' +
        '<div class="form-col">' +
          '<label class="label">Monto</label>' +
          '<div class="input-monto-wrap">' +
            '<span class="peso-sign">$</span>' +
            '<input class="input-base input-monto" id="input-abono-monto" type="text" inputmode="numeric" value="' + formattedMonto + '" placeholder="100.000" />' +
          '</div>' +
        '</div>' +
        '<div class="form-col">' +
          '<label class="label">Fecha</label>' +
          '<input class="input-base" id="input-abono-fecha" type="date" value="' + state.nuevoFecha + '" />' +
        '</div>' +
      '</div>' +
      '<button class="btn-primario" data-action="agregar-abono">' + icon('plus') + ' Registrar abono</button>' +
    '</div>';
  }

  let historialHtml;
  if (abonosSorted.length === 0) {
    historialHtml = '<div class="vacio" style="padding:20px;"><div class="vacio-sub">Aún no hay abonos registrados</div></div>';
  } else {
    historialHtml = '<div class="lista-items">' + abonosSorted.map(a =>
      '<div class="registro-item">' +
        '<div class="registro-info">' +
          '<div class="registro-monto">' + fmtPesos(a.monto) + '</div>' +
          '<div class="registro-fecha">' + fmtFecha(a.fecha) + '</div>' +
        '</div>' +
        '<button class="icon-btn-small" data-action="eliminar-abono" data-id="' + a.id + '">' + icon('trash', 16) + '</button>' +
      '</div>'
    ).join('') + '</div>';
  }

  document.getElementById('root').innerHTML =
    '<div class="app fade-in">' +
      '<button class="back-btn" data-action="volver">← Volver</button>' +
      '<div class="detalle-header">' + headerHtml + '</div>' +
      '<div class="progress-card">' +
        '<div class="progress-top"><span class="label">Pagado</span><span class="progress-pct">' + pp.toFixed(0) + '%</span></div>' +
        '<div class="progress-monto">' + fmtPesos(tp) + '</div>' +
        '<div class="barra-fondo"><div class="barra-llena ' + (done ? 'done' : 'pending') + '" style="width:' + pp + '%"></div></div>' +
        '<div class="progress-bottom">' +
          '<div><div class="mini-stat-label">Falta</div><div class="mini-stat-valor" style="color:#e08a3a;">' + fmtPesos(restante(p)) + '</div></div>' +
          '<div style="text-align:right;"><div class="mini-stat-label">Meta</div><div class="mini-stat-valor" style="color:#c4b5a0;">' + fmtPesos(META_POR_PERSONA) + '</div></div>' +
        '</div>' +
        (done ? '<div class="completo-badge">✓ Cuota completa</div>' : '') +
      '</div>' +
      formAbonoHtml +
      '<div class="seccion">' +
        '<div class="historial-titulo">' + icon('calendar', 16) + ' Historial de abonos <span class="historial-count">' + (p.abonos || []).length + '</span></div>' +
        historialHtml +
      '</div>' +
      '<button class="btn-eliminar" data-action="eliminar-persona" data-id="' + p.id + '">' + icon('trash', 14) + ' Eliminar persona</button>' +
    '</div>';
}

function syncInputs() {
  const map = {
    'input-nombre-nueva': 'nuevoNombre',
    'input-edit-nombre': 'nombreEdit',
    'input-abono-fecha': 'nuevoFecha',
    'input-gasto-fecha': 'gastoFecha',
    'input-gasto-desc': 'gastoDesc'
  };
  for (const id in map) {
    const el = document.getElementById(id);
    if (el) state[map[id]] = el.value;
  }
  const am = document.getElementById('input-abono-monto');
  if (am) state.nuevoMonto = am.value.replace(/\D/g, '');
  const gm = document.getElementById('input-gasto-monto');
  if (gm) state.gastoMonto = gm.value.replace(/\D/g, '');
}

function attachHandlers() {
  const els = document.querySelectorAll('[data-action]');
  els.forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      const id = el.dataset.id;

      if (action === 'set-tab') { state.tab = el.dataset.tab; render(); }
      else if (action === 'ver-persona') {
        state.personaSelId = id;
        state.vista = 'detalle';
        state.editandoNombre = false;
        state.nuevoMonto = '';
        state.nuevoFecha = hoyISO();
        render();
      }
      else if (action === 'volver') {
        state.vista = 'lista';
        state.personaSelId = null;
        state.editandoNombre = false;
        render();
      }
      else if (action === 'mostrar-form-persona') { state.showFormPersona = true; render(); }
      else if (action === 'cancelar-persona') { state.showFormPersona = false; state.nuevoNombre = ''; render(); }
      else if (action === 'agregar-persona') { syncInputs(); agregarPersona(); }
      else if (action === 'eliminar-persona') { eliminarPersona(id); }
      else if (action === 'editar-nombre') {
        const p = state.personas.find(x => x.id === state.personaSelId);
        state.nombreEdit = p ? p.nombre : '';
        state.editandoNombre = true;
        render();
      }
      else if (action === 'guardar-nombre') { syncInputs(); guardarNombreEdit(); }
      else if (action === 'cancelar-edit-nombre') { state.editandoNombre = false; render(); }
      else if (action === 'agregar-abono') { syncInputs(); agregarAbono(); }
      else if (action === 'eliminar-abono') { eliminarAbono(id); }
      else if (action === 'mostrar-form-gasto') { state.showFormGasto = true; render(); }
      else if (action === 'cancelar-gasto') { state.showFormGasto = false; state.gastoMonto = ''; state.gastoDesc = ''; render(); }
      else if (action === 'agregar-gasto') { syncInputs(); agregarGasto(); }
      else if (action === 'eliminar-gasto') { eliminarGasto(id); }
      else if (action === 'set-cat') { syncInputs(); state.gastoCat = el.dataset.cat; render(); }
      else if (action === 'filtro-cat') { state.filtroCat = el.dataset.cat; render(); }
    });
  });

  const nombreInput = document.getElementById('input-nombre-nueva');
  if (nombreInput) {
    nombreInput.focus();
    nombreInput.addEventListener('input', e => state.nuevoNombre = e.target.value);
    nombreInput.addEventListener('keydown', e => { if (e.key === 'Enter') agregarPersona(); });
  }

  const editNombre = document.getElementById('input-edit-nombre');
  if (editNombre) {
    editNombre.focus();
    try { editNombre.setSelectionRange(editNombre.value.length, editNombre.value.length); } catch(e){}
    editNombre.addEventListener('input', e => state.nombreEdit = e.target.value);
    editNombre.addEventListener('keydown', e => { if (e.key === 'Enter') guardarNombreEdit(); });
  }

  const abonoMonto = document.getElementById('input-abono-monto');
  if (abonoMonto) {
    abonoMonto.addEventListener('input', e => {
      const raw = e.target.value.replace(/\D/g, '');
      state.nuevoMonto = raw;
      e.target.value = raw ? parseInt(raw, 10).toLocaleString('es-CO') : '';
    });
  }
  const abonoFecha = document.getElementById('input-abono-fecha');
  if (abonoFecha) abonoFecha.addEventListener('change', e => state.nuevoFecha = e.target.value);

  const gastoMonto = document.getElementById('input-gasto-monto');
  if (gastoMonto) {
    gastoMonto.focus();
    gastoMonto.addEventListener('input', e => {
      const raw = e.target.value.replace(/\D/g, '');
      state.gastoMonto = raw;
      e.target.value = raw ? parseInt(raw, 10).toLocaleString('es-CO') : '';
    });
  }
  const gastoFecha = document.getElementById('input-gasto-fecha');
  if (gastoFecha) gastoFecha.addEventListener('change', e => state.gastoFecha = e.target.value);
  const gastoDesc = document.getElementById('input-gasto-desc');
  if (gastoDesc) gastoDesc.addEventListener('input', e => state.gastoDesc = e.target.value);
}

cargar();
</script>

</body>
</html>
